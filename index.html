<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lumière — Fine Dining, Effortless Ordering</title>
    <link rel="stylesheet" href="index.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300..700;1,300..700&display=swap"
        rel="stylesheet">

</head>
<body>

    <!-- Simple Header with Logo + Cart -->
    <header class="header">
        <h1 class="logo">Lumière</h1>
        <button class="cart-btn" id="cart-btn">
            Cart (<span id="cart-count">0</span>) · $<span id="cart-total">0</span>
        </button>
    </header>

    <!-- Hero Section -->
    <section class="hero">
        <h2>Fine Dining Meets Frictionless Technology</h2>
        <p>The only restaurant ordering app that respects your taste—and your time.</p>
    </section>

    <!-- Category Filter Buttons -->
    <nav class="category-nav">
        <button class="category-btn active" data-category="all">All</button>
        <button class="category-btn" data-category="Starters">Starters</button>
        <button class="category-btn" data-category="Main">Mains</button>
        <button class="category-btn" data-category="Sides">Sides</button>
        <button class="category-btn" data-category="Desserts">Desserts</button>
        <button class="category-btn" data-category="Drinks">Drinks</button>
    </nav>

    <!-- Menu Grid (2 columns on desktop, 1 on mobile) -->
    <main class="menu-grid" id="menu-container">
        <!-- Items render here via JavaScript -->
    </main>
    
    <!-- Order Summary (shows on right side when cart has items) -->
    <aside class="order-sidebar" id="order-sidebar">
        <!-- Cart items render here via JavaScript -->
    </aside>

    <!-- Payment Modal -->
    <div class="modal hidden" id="payment-modal">
        <div class="modal-overlay"></div>
        <div class="modal-content">
            <h3>Complete Your Order</h3>
            <form id="payment-form">
                <input type="text" name="fullName" placeholder="Full Name" required />
                <input type="tel" name="phone" placeholder="Phone Number" required />
                <input type="text" name="cardNumber" placeholder="Card Number (16 digits)" pattern="[0-9]{16}" required />
                <input type="text" name="cvv" placeholder="CVV (3 digits)" pattern="[0-9]{3}" required />
                <button type="submit" class="pay-btn">
                    Pay $<span id="final-total">0</span>
                </button>
            </form>
        </div>
    </div>
